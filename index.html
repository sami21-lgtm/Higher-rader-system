<!DOCTYPE html>
<html lang = "en">
<head>
  <meta charset = "UTF-8">
  <meta name = "viewport" content = width=device-width, initial scale = 1.0">
  <title>Futuristic Tactical Radar System</title>
  <link rel = "stylesheet" href = "style.css">
</head>
<body>
  div class="radar-container">
        <div class="radar-bezel">
            <div class="radar-screen">
                <div class="grid-lines"></div>
                
                <div class="sweep"></div>
                
                <div class="dot dot-1"></div>
                <div class="dot dot-2"></div>
                <div class="dot dot-3"></div>
                <div class="dot dot-4"></div>
                <div class="dot dot-5"></div>
            </div>
        </div>

        <div class="toggle-container">
            <div class="toggle-segmented">
                <input type="radio" name="theme" id="v1">
                <label for="v1">Ver. 1</label>

                <input type="radio" name="theme" id="v2">
                <label for="v2">Ver. 2</label>

                <input type="radio" name="theme" id="v3" checked>
                <label for="v3">Ver. 3</label>
                
                <span class="glider"></span>
            </div>
        </div>

        <div class="lighting-info-block">
            <div class="credit-text">
                Developed by <span class="dev-name">Md. Emtiaz Hossain Sami</span><br>
                <span class="dept-info">Dept. of Software Engineering,</span><br>
                <span class="univ-info">Daffodil International University</span><br>
                <span class="copy-info">© 2026 Copyright</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
<html></html>
